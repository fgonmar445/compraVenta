{% extends "base.html" %}

{% block content %}
<div class="container py-4">

    <h2 class="text-center mb-4">Productos disponibles</h2>

    <div class="row justify-content-center g-4">
        {% for producto in productos %}
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
            <div class="card shadow-sm border-0 rounded-4" style="max-width: 320px; margin: auto;">

                <div class="card-body">
                    <h5 class="card-title fw-semibold">{{ producto.titulo }}</h5>

                    <p class="card-text text-muted small">
                        {{ producto.descripcion|truncatewords:12 }}
                    </p>

                    <p class="fw-bold text-primary fs-5 mb-3">
                        {{ producto.precio }} €
                    </p>

                    <a href="{% url 'detalle_producto' producto.pk %}" 
                       class="btn btn-sm btn-outline-primary w-100">
                        Ver detalle
                    </a>
                </div>

            </div>
        </div>
        {% empty %}
        <p class="text-center">No hay productos disponibles.</p>
        {% endfor %}
    </div>

</div>
{% endblock %}
